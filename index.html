<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>水やり管理</title>

  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="apple-touch-icon.png" type="image/png">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <header class="header">
      <div>
        <p class="eyebrow">PLANT CARE</p>
        <h1>水やり管理</h1>

        <section class="auth-area">
          <p id="user-info">ログイン状態を確認中...</p>

          <button id="login-button" type="button">
            Googleでログイン
          </button>

          <button id="logout-button" type="button" hidden>
            ログアウト
          </button>
        </section>
      </div>

      <button id="addPlantButton" class="add-button" type="button">
        ＋ 植物を追加
      </button>
    </header>

    <section id="plantList" class="plant-list">
      <!-- JavaScriptで植物を表示します -->
    </section>
  </main>

 <script type="module" src="firebase.js?v=2"></script>
 <script src="script.js?v=3"></script>
</body>
</html>
